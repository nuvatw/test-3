<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>生日派對邀請</title>
    <style>
      :root {
        --paper: #fdf8f3;
        --ink: #2c2420;
        --muted: #5c534c;
        --accent: #c45c4a;
        --accent-soft: rgba(196, 92, 74, 0.12);
        --line: rgba(44, 36, 32, 0.12);
        --shadow: 0 18px 48px rgba(44, 36, 32, 0.08);
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        background:
          radial-gradient(1200px 600px at 10% -10%, rgba(196, 92, 74, 0.14), transparent 55%),
          radial-gradient(900px 500px at 100% 20%, rgba(212, 168, 120, 0.2), transparent 50%),
          var(--paper);
        font-family: "PingFang TC", "Noto Sans TC", "Microsoft JhengHei", "Heiti TC", sans-serif;
        line-height: 1.65;
        letter-spacing: 0.02em;
      }

      .wrap {
        max-width: 40rem;
        margin: 0 auto;
        padding: clamp(1.75rem, 5vw, 3rem) clamp(1.25rem, 4vw, 2rem) 3rem;
      }

      header {
        text-align: center;
        margin-bottom: 2.25rem;
      }

      .eyebrow {
        display: inline-block;
        font-size: 0.75rem;
        font-weight: 600;
        letter-spacing: 0.28em;
        text-transform: uppercase;
        color: var(--accent);
        margin-bottom: 0.75rem;
      }

      h1 {
        margin: 0 0 0.5rem;
        font-size: clamp(1.85rem, 5vw, 2.35rem);
        font-weight: 700;
        line-height: 1.2;
      }

      .sub {
        margin: 0;
        color: var(--muted);
        font-size: 1rem;
      }

      .card {
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid var(--line);
        border-radius: 1rem;
        box-shadow: var(--shadow);
        padding: clamp(1.5rem, 4vw, 2rem);
        backdrop-filter: blur(8px);
      }

      section + section {
        margin-top: 1.75rem;
      }

      h2 {
        margin: 0 0 1rem;
        font-size: 0.85rem;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--muted);
      }

      dl {
        margin: 0;
        display: grid;
        gap: 0.85rem 1rem;
      }

      @media (min-width: 28rem) {
        dl {
          grid-template-columns: 5.5rem 1fr;
        }
      }

      dt {
        margin: 0;
        font-size: 0.9rem;
        font-weight: 600;
        color: var(--muted);
      }

      dd {
        margin: 0;
        font-size: 1.05rem;
      }

      .note {
        margin-top: 1rem;
        padding-top: 1rem;
        border-top: 1px dashed var(--line);
        font-size: 0.95rem;
        color: var(--muted);
      }

      .timeline {
        list-style: none;
        margin: 0;
        padding: 0;
        border-left: 2px solid var(--accent-soft);
      }

      .timeline li {
        position: relative;
        padding: 0 0 1.35rem 1.35rem;
      }

      .timeline li:last-child {
        padding-bottom: 0;
      }

      .timeline li::before {
        content: "";
        position: absolute;
        left: -0.42rem;
        top: 0.35rem;
        width: 0.65rem;
        height: 0.65rem;
        border-radius: 50%;
        background: var(--accent);
        box-shadow: 0 0 0 4px var(--accent-soft);
      }

      .time {
        display: block;
        font-variant-numeric: tabular-nums;
        font-weight: 700;
        color: var(--accent);
        font-size: 0.95rem;
        margin-bottom: 0.25rem;
      }

      .timeline p {
        margin: 0;
        font-size: 1.02rem;
      }

      footer {
        margin-top: 2rem;
        text-align: center;
        font-size: 0.9rem;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <p class="eyebrow">Invitation</p>
        <h1>生日派對</h1>
        <p class="sub">誠摯邀請你一起慶祝</p>
      </header>

      <main class="card">
        <section aria-labelledby="details-heading">
          <h2 id="details-heading">活動資訊</h2>
          <dl>
            <dt>日期</dt>
            <dd>
              <time datetime="2025-08-12">2025 年 8 月 12 日（二）</time>
            </dd>
            <dt>時間</dt>
            <dd>
              <time datetime="2025-08-12T20:00">20:00</time>–<time datetime="2025-08-12T22:00">22:00</time>
            </dd>
            <dt>地點</dt>
            <dd>台北車站（集合點與詳細位置將另行通知，或請私訊確認）</dd>
          </dl>
          <p class="note">若需無障礙動線或攜帶伴侶／孩童，歡迎事先告知。</p>
        </section>

        <section aria-labelledby="schedule-heading">
          <h2 id="schedule-heading">當日流程</h2>
          <ol class="timeline" role="list">
            <li>
              <span class="time">20:00–20:10</span>
              <p>唱歌時段（約 10 分鐘）</p>
            </li>
            <li>
              <span class="time">20:10–22:00</span>
              <p>吃蛋糕、聊天；其餘時間輕鬆相聚</p>
            </li>
            <li>
              <span class="time">22:00</span>
              <p>活動結束，期待下次再見</p>
            </li>
          </ol>
        </section>
      </main>

      <footer>
        <p>期待與你相見</p>
      </footer>
    </div>
  </body>
</html>
